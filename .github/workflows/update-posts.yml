name: Mise à jour de la base de posts

on:
  schedule:
    - cron: "0 5 * * *" # tous les jours à 05:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Récupérer les posts Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: node scripts/fetch-posts.js

      - name: Commit et push si data/posts.json a changé
        run: |
          if git diff --quiet -- data/posts.json; then
            echo "Aucun changement, rien à committer."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "chore: update posts data [skip ci]"
          git push
