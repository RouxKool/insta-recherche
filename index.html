<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Est-ce qu'on en a déjà parlé ?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Est-ce qu'on en a déjà parlé&nbsp;?</h1>
    <p class="subtitle">Recherche dans les carrousels déjà publiés sur Instagram.</p>

    <form id="search-form">
      <input
        type="text"
        id="query"
        name="query"
        placeholder="ex. doomscroll, charge mentale, éco-anxiété..."
        autocomplete="off"
        required
      />
      <button type="submit">Rechercher</button>
    </form>

    <div id="status" class="status" hidden></div>
    <div id="results" class="results"></div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
