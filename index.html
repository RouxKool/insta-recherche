<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Est-ce qu'on en a déjà parlé ?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Est-ce qu'on en a déjà parlé&nbsp;?</h1>
    <p class="subtitle">Recherche dans les carrousels et reels déjà publiés sur Instagram.</p>

    <form id="search-form">
      <input
        type="text"
        id="query"
        name="query"
        placeholder="ex. doomscroll, scroll compulsif, addiction écran"
        autocomplete="off"
        required
      />
      <button type="submit">Rechercher</button>
    </form>
    <p class="hint">Astuce : sépare plusieurs mots-clés par une virgule pour élargir la recherche à plusieurs reformulations d'un même sujet.</p>

    <div id="format-filter" class="filter-group" role="group" aria-label="Filtrer par format">
      <button type="button" class="filter-btn is-active" data-filter="all">Tous</button>
      <button type="button" class="filter-btn" data-filter="carousel">Carrousels</button>
      <button type="button" class="filter-btn" data-filter="reel">Reels</button>
    </div>

    <div id="status" class="status" hidden></div>
    <div id="stats" class="stats" hidden></div>
    <div id="results" class="results"></div>
    <button id="load-more" type="button" class="load-more" hidden>Afficher plus</button>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
